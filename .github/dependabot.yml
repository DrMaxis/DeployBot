version: 2

updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "wednesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      laravel:
        patterns:
          - "illuminate/*"
          - "laravel/*"
          - "orchestra/*"
      php-quality:
        patterns:
          - "phpstan/*"
          - "larastan/*"
          - "pestphp/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "wednesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
